name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saida
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d saida"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: saida
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock.txt
          pip install -e . --no-deps

      - name: Lint (Ruff)
        run: python -m ruff check src/saida spec_tests

      - name: Type Check (MyPy)
        run: python -m mypy --config-file pyproject.toml src/saida

      - name: Wait for DB services
        env:
          TEST_POSTGRES_DSN: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/saida
          TEST_MYSQL_DSN: mysql+pymysql://root:root@127.0.0.1:3306/saida
        run: |
          python - <<'PY'
          import time
          from sqlalchemy import create_engine, text

          def wait(dsn, query, name, attempts=40):
              for i in range(attempts):
                  try:
                      e = create_engine(dsn, future=True)
                      with e.connect() as c:
                          c.execute(text(query))
                      print(f"{name} ready")
                      return
                  except Exception:
                      time.sleep(2)
              raise SystemExit(f"{name} not ready in time")

          wait("postgresql+psycopg://postgres:postgres@127.0.0.1:5432/saida", "SELECT 1", "postgres")
          wait("mysql+pymysql://root:root@127.0.0.1:3306/saida", "SELECT 1", "mysql")
          PY

      - name: Run migrations (PostgreSQL)
        run: |
          python -m alembic -c alembic.ini -x db_url=postgresql+psycopg://postgres:postgres@127.0.0.1:5432/saida upgrade head

      - name: Enforce Benchmark Threshold Gate
        run: |
          python -m saida.benchmarking.ci_gate \
            --suite benchmarks/suites/core_v1.json \
            --datasets benchmarks/datasets \
            --dsn sqlite+pysqlite:///:memory: \
            --parquet-root ./.saida/ci-bench-parquet

      - name: Run tests
        env:
          SAIDA_LLM_PROVIDER: mock
          SAIDA_EMBEDDING_PROVIDER: mock
          SAIDA_CONTROL_PLANE_DSN: sqlite+pysqlite:///:memory:
          TEST_POSTGRES_DSN: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/saida
          TEST_MYSQL_DSN: mysql+pymysql://root:root@127.0.0.1:3306/saida
        run: python -m pytest -q
